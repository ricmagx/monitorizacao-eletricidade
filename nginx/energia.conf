# Configuracao nginx para reverse proxy da aplicacao de energia
#
# INSTRUCOES DE INSTALACAO NO UNRAID:
# ====================================
# 1. Verificar como o nginx esta configurado no Unraid:
#    ssh unraid "docker exec nginx cat /etc/nginx/nginx.conf"
#
# 2a. Se o nginx tiver include conf.d/*.conf (ou similar):
#     Copiar este ficheiro para /mnt/user/appdata/nginx/conf.d/energia.conf
#     e fazer reload: docker exec nginx nginx -s reload
#
# 2b. Se o nginx NAO tiver include conf.d/ (apenas um nginx.conf monolitico):
#     Copiar manualmente o bloco 'location' abaixo para dentro do server block
#     existente em nginx.conf e fazer reload.
#
# NOTA: O deploy.sh copia este ficheiro automaticamente para conf.d/energia.conf
#       Se o nginx do Unraid nao suportar conf.d/, editar manualmente.
#
# Pressuposto: container energia-monitor expoe a porta 8001 no host Unraid
# (ver docker-compose.prod.yml: ports: "8001:8000")

location /hobbies/casa/energia/ {
    # proxy_pass com trailing slash: retira o prefixo /hobbies/casa/energia do path
    proxy_pass http://127.0.0.1:8001/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Informar o FastAPI do prefixo real para geracao correcta de URLs
    proxy_set_header X-Forwarded-Prefix /hobbies/casa/energia;

    # WebSocket support (necessario para HTMX se usar websockets no futuro)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
