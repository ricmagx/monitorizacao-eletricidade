<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitorizacao Eletricidade</title>
  <script>
    // Detectar base path automaticamente (funciona com HA Ingress, nginx proxy, localhost)
    var _bp = window.location.pathname;
    if (!_bp.endsWith('/')) _bp = _bp.substring(0, _bp.lastIndexOf('/') + 1);
    document.write('<base href="' + _bp + '">');
  </script>
  <meta name="root-path" content="">
  <link rel="stylesheet" href="static/style.css?v=4">
  <script src="static/vendor/htmx.min.js"></script>
  <script src="static/vendor/chart.umd.min.js"></script>
  <script>
    // ROOT_PATH para HTMX: prefixar paths absolutos com o base path
    var ROOT_PATH = _bp.replace(/\/$/, '');
    document.querySelector('meta[name="root-path"]').content = ROOT_PATH;
    if (ROOT_PATH) {
      document.addEventListener('htmx:configRequest', function(evt) {
        if (evt.detail.path && evt.detail.path.startsWith('/') && !evt.detail.path.startsWith(ROOT_PATH)) {
          evt.detail.path = ROOT_PATH + evt.detail.path;
        }
      });
    }
  </script>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
